server:
  port: 8080

spring:
  application:
    name: API-Gateway

  cloud:
    gateway:
      routes:

        - id: customer-service
          uri: http://localhost:8081
          predicates:
            - Path=/customer/**
          filters:
            - RewritePath=/customer/(?<segment>.*), /${segment}

        - id: billing-service
          uri: http://localhost:8082
          predicates:
            - Path=/billing/**
          filters:
            - RewritePath=/billing/(?<segment>.*), /${segment}

management:
  endpoints:
    web:
      exposure:
        include: "*"